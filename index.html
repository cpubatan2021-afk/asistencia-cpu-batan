<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>CPU Batán · Control de Asistencia</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            height: 100vh;
            overflow: hidden;
        }
        .app { display: flex; height: 100vh; }
        .sidebar {
            width: 280px;
            background: #1e293b;
            border-right: 1px solid #334155;
            transition: transform 0.3s ease;
            position: fixed;
            height: 100vh;
            z-index: 200;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 1rem;
            border-bottom: 1px solid #334155;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .logo-area img { height: 40px; width: auto; }
        .logo-area h2 { font-size: 1rem; color: #818cf8; }
        .close-sidebar {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.2rem;
            cursor: pointer;
            display: none;
        }
        .sidebar-content {
            flex: 1;
            padding: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }
        .materia-list {
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            max-height: 280px;
            overflow-y: auto;
        }
        .materia-item {
            background: #334155;
            border-radius: 0.5rem;
            padding: 0.4rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-size: 0.85rem;
        }
        .materia-item.active { background: #4f46e5; }
        .delete-materia {
            color: #f87171;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .btn {
            background: #4f46e5;
            border: none;
            padding: 0.4rem;
            border-radius: 0.5rem;
            color: white;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            width: 100%;
            font-size: 0.8rem;
        }
        .btn-success { background: #10b981; }
        .btn-warning { background: #f59e0b; color: black; }
        .btn-danger { background: #ef4444; }
        .btn-sm { padding: 0.3rem 0.6rem; font-size: 0.75rem; width: auto; display: inline-flex; }
        .main {
            flex: 1;
            margin-left: 280px;
            padding: 0.8rem;
            overflow-y: auto;
            height: 100vh;
        }
        .top-bar {
            background: #1e293b;
            border-radius: 0.5rem;
            padding: 0.5rem 0.8rem;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }
        .top-bar-logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            user-select: none;
        }
        .top-bar-logo img { height: 32px; width: auto; pointer-events: none; }
        .top-bar-logo span { font-size: 0.9rem; font-weight: 600; color: #818cf8; }
        .top-bar-title {
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
            border-left: 1px solid #334155;
            padding-left: 0.8rem;
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
        }
        .card {
            background: #1e293b;
            border-radius: 0.75rem;
            padding: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .card-title {
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.6rem;
            color: #818cf8;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 0.6rem;
            align-items: flex-end;
        }
        input, select, textarea {
            background: #0f172a;
            border: 1px solid #334155;
            padding: 0.4rem;
            border-radius: 0.5rem;
            color: white;
            flex: 1;
            font-size: 0.8rem;
        }
        input:disabled, textarea:disabled, select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            overflow-y: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.8rem;
            min-width: 1000px;
        }
        th, td {
            padding: 0.6rem 0.8rem;
            text-align: left;
            border-bottom: 1px solid #334155;
            border-right: 1px solid #334155;
            white-space: normal;
            word-break: break-word;
        }
        th {
            background: #0f172a;
            position: sticky;
            top: 0;
            font-weight: 600;
            color: #818cf8;
            white-space: nowrap;
        }
        td:last-child, th:last-child { border-right: none; }
        input[type="checkbox"] {
            accent-color: #10b981;
            width: 1rem;
            height: 1rem;
            cursor: pointer;
        }
        .help-text { font-size: 0.7rem; color: #94a3b8; margin-top: 0.2rem; }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #10b981;
            color: black;
            padding: 0.4rem 0.8rem;
            border-radius: 2rem;
            z-index: 1000;
            font-size: 0.8rem;
        }
        .search-box { flex: 2; min-width: 120px; }
        .order-select { width: auto; flex: 0 0 auto; font-size: 0.75rem; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1e293b;
            border-radius: 0.75rem;
            max-width: 500px;
            width: 90%;
            padding: 1rem;
            border: 1px solid #4f46e5;
        }
        .modal-header { display: flex; justify-content: space-between; margin-bottom: 1rem; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.5rem 0; }
        .stat-badge {
            background: #0f172a;
            border-radius: 2rem;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: normal;
            margin-left: 0.5rem;
            color: #10b981;
        }
        .app-footer {
            margin-top: auto;
            border-top: 1px solid #334155;
            padding-top: 0.5rem;
            font-size: 0.65rem;
            color: #64748b;
            text-align: center;
        }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); width: 260px; }
            .sidebar.open { transform: translateX(0); }
            .main { margin-left: 0; }
            .hamburger { display: block; }
            .close-sidebar { display: block; }
            .top-bar-title { display: none; }
            th, td { padding: 0.4rem 0.5rem; }
        }
    </style>
</head>
<body>
<div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo-area">
                <img src="https://raw.githubusercontent.com/cpubatan2021-afk/asistencia-cpu-batan/main/image%20(1).png" alt="CPU">
                <h2>CPU Batán</h2>
            </div>
            <button class="close-sidebar" id="closeSidebarBtn"><i class="fas fa-times"></i></button>
        </div>
        <div class="sidebar-content">
            <div id="materiasList" class="materia-list"></div>
            <button id="btnNuevaMateria" class="btn"><i class="fas fa-plus"></i> Nueva Materia</button>
            <button id="btnMatricular" class="btn btn-outline"><i class="fas fa-user-plus"></i> Matricular Alumno</button>
            <button id="btnExportarExcel" class="btn btn-success"><i class="fas fa-file-excel"></i> Exportar Excel</button>
            <button id="btnImportarExcel" class="btn btn-warning"><i class="fas fa-upload"></i> Importar Excel</button>
            <button id="btnResetear" class="btn btn-danger"><i class="fas fa-trash-alt"></i> Limpiar todo</button>
            <button id="btnLogoutAdmin" class="btn" style="background:#f59e0b; color:black; display:none;"><i class="fas fa-sign-out-alt"></i> Salir modo admin</button>
            <input type="file" id="fileExcel" style="display:none" accept=".xlsx, .xls">
            <div class="help-text" style="text-align:center;">Auto-sync cada 30s</div>
            <div class="app-footer">
                <i class="fas fa-code"></i> v1.0.0 | Desarrollado por <strong>La Clave Argentina</strong>
            </div>
        </div>
    </div>

    <!-- Main -->
    <div class="main" id="main">
        <div class="top-bar">
            <div class="top-bar-left">
                <button class="hamburger" id="hamburgerBtn"><i class="fas fa-bars"></i></button>
                <div class="top-bar-logo" id="adminToggleArea">
                    <img src="https://raw.githubusercontent.com/cpubatan2021-afk/asistencia-cpu-batan/main/image%20(1).png" alt="CPU Batán">
                    <span>CPU Batán</span>
                </div>
                <div class="top-bar-title">Control de Asistencia</div>
            </div>
            <div class="clock" id="clock"></div>
        </div>

        <!-- Formulario de matrícula -->
        <div id="formMatricula" class="card" style="display:none;">
            <div class="card-title"><i class="fas fa-user-plus"></i> Matricular nuevo alumno en <span id="materiaActualMatricula"></span></div>
            <div class="flex-row">
                <input type="text" id="alumnoApellido" placeholder="Apellido *">
                <input type="text" id="alumnoNombre" placeholder="Nombre *">
                <input type="text" id="alumnoDNI" placeholder="DNI (opcional)">
                <input type="text" id="alumnoPabellon" placeholder="Pabellón *">
            </div>
            <div class="flex-row">
                <input type="date" id="alumnoFechaIngreso" placeholder="Fecha inscripción">
                <input type="date" id="alumnoFechaVencimiento" placeholder="Fecha vencimiento carnet">
                <button id="guardarAlumno" class="btn-success btn-sm">Guardar</button>
            </div>
        </div>

        <!-- Fechas de clase -->
        <div id="fechasSection" class="card" style="display:none;">
            <div class="card-title"><i class="fas fa-calendar-alt"></i> Fechas de clase <span id="materiaSeleccionada"></span></div>
            <div class="flex-row">
                <input type="text" id="nuevaFecha" placeholder="Ej: 2026-04-15">
                <button id="agregarFechaBtn" class="btn btn-sm">Agregar</button>
                <button id="eliminarFechaBtn" class="btn-danger btn-sm">Eliminar</button>
            </div>
            <div id="listaFechas" style="display: flex; flex-wrap: wrap; gap: 0.4rem;"></div>
        </div>

        <!-- Asistencia de la materia actual -->
        <div id="asistenciaSection" class="card" style="display:none;">
            <div class="card-title">
                <i class="fas fa-check-double"></i> Asistencia
                <span id="contadorAlumnosMateria" class="stat-badge"></span>
                <div style="margin-left: auto; display: flex; gap: 0.4rem;">
                    <input type="text" id="searchAlumno" class="search-box" placeholder="🔍 Buscar...">
                    <select id="orderAsistencia" class="order-select">
                        <option value="apellido_asc">Apellido (A-Z)</option>
                        <option value="apellido_desc">Apellido (Z-A)</option>
                        <option value="nombre_asc">Nombre (A-Z)</option>
                        <option value="nombre_desc">Nombre (Z-A)</option>
                        <option value="pabellon">Pabellón</option>
                        <option value="dni">DNI</option>
                    </select>
                </div>
            </div>
            <div id="tablaAsistencia" class="table-wrapper"></div>
        </div>

        <!-- Lista general de alumnos (matrícula completa) -->
        <div id="listaGeneralSection" class="card">
            <div class="card-title">
                <i class="fas fa-users"></i> Matrícula completa
                <span id="contadorAlumnosTotal" class="stat-badge"></span>
                <div style="margin-left: auto; display: flex; gap: 0.4rem;">
                    <input type="text" id="searchGeneral" class="search-box" placeholder="🔍 Buscar...">
                    <select id="orderGeneral" class="order-select">
                        <option value="apellido_asc">Apellido (A-Z)</option>
                        <option value="apellido_desc">Apellido (Z-A)</option>
                        <option value="nombre_asc">Nombre (A-Z)</option>
                        <option value="nombre_desc">Nombre (Z-A)</option>
                        <option value="pabellon">Pabellón</option>
                        <option value="dni">DNI</option>
                    </select>
                </div>
            </div>
            <div id="tablaGeneral" class="table-wrapper"></div>
        </div>

        <!-- Estadísticas -->
        <div class="card">
            <div class="card-title"><i class="fas fa-chart-line"></i> Estadísticas</div>
            <div class="flex-row">
                <select id="estMateria"></select>
                <button id="generarEstadisticasBtn" class="btn-sm">Generar</button>
            </div>
            <div id="estadisticasResumen"></div>
            <canvas id="graficoAsistencia" style="max-height: 200px; margin-top: 0.8rem;"></canvas>
        </div>
    </div>
</div>

<!-- Modal Nueva Materia -->
<div id="modalNuevaMateria" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Nueva Materia</h3>
            <button id="closeModalBtn" style="background:none; border:none; color:#94a3b8; font-size:1.2rem; cursor:pointer;">&times;</button>
        </div>
        <div class="flex-row">
            <input type="text" id="nuevaMateriaNombre" placeholder="Nombre de la materia *">
        </div>
        <div>
            <label>Días de clase:</label>
            <div class="checkbox-group">
                <label><input type="checkbox" value="Lunes"> Lunes</label>
                <label><input type="checkbox" value="Martes"> Martes</label>
                <label><input type="checkbox" value="Miércoles"> Miércoles</label>
                <label><input type="checkbox" value="Jueves"> Jueves</label>
                <label><input type="checkbox" value="Viernes"> Viernes</label>
            </div>
        </div>
        <div class="flex-row">
            <input type="time" id="nuevaMateriaHoraInicio" placeholder="Hora inicio">
            <input type="time" id="nuevaMateriaHoraFin" placeholder="Hora fin">
        </div>
        <div class="flex-row">
            <button id="confirmarNuevaMateria" class="btn-success btn-sm">Crear Materia</button>
            <button id="cancelarNuevaMateria" class="btn-danger btn-sm">Cancelar</button>
        </div>
    </div>
</div>

<script>
    // ==================== CONFIGURACIÓN GITHUB ====================
    const GITHUB_TOKEN = "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";
    const GITHUB_USER = "cpubatan2021-afk";
    const GITHUB_REPO = "asistencia-cpu-batan";
    const GITHUB_FILE = "datos.json";
    const GITHUB_API_URL = `https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${GITHUB_FILE}`;
    const GITHUB_RAW_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/${GITHUB_FILE}`;

    let globalData = { materias: [], alumnos: [] };
    let currentMateriaId = null;
    let chartInstance = null;
    let hayCambios = false;
    let currentOrdenAsistencia = "apellido_asc";
    let currentOrdenGeneral = "apellido_asc";
    let searchAsistencia = "";
    let searchGeneral = "";
    
    let adminMode = false;
    let clickCount = 0;
    let clickTimer = null;

    function enableAdminMode() {
        adminMode = true;
        mostrarToast("🔓 Modo administrador activado (sesión temporal)", false);
        renderizarSegunRol();
    }
    
    function disableAdminMode() {
        adminMode = false;
        mostrarToast("🔒 Modo espectador activado", false);
        renderizarSegunRol();
    }
    
    function renderizarSegunRol() {
        const adminButtons = ['btnNuevaMateria', 'btnMatricular', 'btnImportarExcel', 'btnResetear', 'agregarFechaBtn', 'eliminarFechaBtn'];
        adminButtons.forEach(id => {
            const btn = document.getElementById(id);
            if (btn) btn.style.display = adminMode ? 'flex' : 'none';
        });
        const logoutAdminBtn = document.getElementById('btnLogoutAdmin');
        if (logoutAdminBtn) logoutAdminBtn.style.display = adminMode ? 'flex' : 'none';
        renderSidebar();
        if (currentMateriaId) {
            renderFechas();
            renderTablaAsistencia();
        } else {
            document.getElementById('fechasSection').style.display = 'none';
            document.getElementById('asistenciaSection').style.display = 'none';
            document.getElementById('formMatricula').style.display = 'none';
            const contadorMateria = document.getElementById('contadorAlumnosMateria');
            if (contadorMateria) contadorMateria.innerText = '';
        }
        renderListaGeneral();
    }

    function setupAdminToggle() {
        const logoArea = document.getElementById('adminToggleArea');
        if (!logoArea) return;
        logoArea.addEventListener('click', (e) => {
            e.stopPropagation();
            if (adminMode) return;
            clickCount++;
            if (clickTimer) clearTimeout(clickTimer);
            clickTimer = setTimeout(() => {
                if (clickCount >= 5) enableAdminMode();
                clickCount = 0;
            }, 800);
        });
    }
    
    async function guardarEnGitHub() {
        if (!hayCambios) return;
        const contenido = btoa(unescape(encodeURIComponent(JSON.stringify(globalData, null, 2))));
        try {
            let sha = null;
            const getResp = await fetch(GITHUB_API_URL, { headers: { Authorization: `token ${GITHUB_TOKEN}` } });
            if (getResp.ok) { const fileInfo = await getResp.json(); sha = fileInfo.sha; }
            const payload = { message: "Actualización automática", content: contenido, branch: "main" };
            if (sha) payload.sha = sha;
            const putResp = await fetch(GITHUB_API_URL, { method: "PUT", headers: { Authorization: `token ${GITHUB_TOKEN}`, "Content-Type": "application/json" }, body: JSON.stringify(payload) });
            if (putResp.ok) { mostrarToast("✅ Sincronizado con GitHub"); hayCambios = false; }
            else throw new Error();
        } catch(e) { mostrarToast("❌ Error de sincronización (ver consola)", true); console.error(e); }
    }

    async function cargarDesdeGitHub() {
        try {
            const res = await fetch(GITHUB_RAW_URL + "?t=" + Date.now());
            if (!res.ok) throw new Error();
            const data = await res.json();
            if (data && (data.materias || data.alumnos)) {
                globalData = { materias: data.materias || [], alumnos: data.alumnos || [] };
                localStorage.setItem('cpu_data', JSON.stringify(globalData));
                mostrarToast("✅ Datos cargados desde GitHub");
                return true;
            }
        } catch(e) { console.warn(e); }
        return false;
    }

    function guardarLocal() {
        localStorage.setItem('cpu_data', JSON.stringify(globalData));
        hayCambios = true;
    }

    function mostrarToast(msg, err = false) {
        let t = document.querySelector('.toast');
        if(t) t.remove();
        t = document.createElement('div');
        t.className = 'toast';
        t.style.background = err ? '#ef4444' : '#10b981';
        t.innerText = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    setInterval(async () => { if (hayCambios) await guardarEnGitHub(); }, 30000);

    function getMaterias() { return globalData.materias; }
    function getCurrentMateria() { return globalData.materias.find(m => m.id === currentMateriaId) || null; }
    function getAlumnosGlobal() { return globalData.alumnos; }

    function getMateriasPorAlumno(alumnoId) {
        return getMaterias().filter(m => m.alumnos.some(a => a.id === alumnoId)).map(m => m.nombre);
    }

    function renderSidebar() {
        const materias = getMaterias();
        const container = document.getElementById('materiasList');
        container.innerHTML = materias.map(m => `
            <div class="materia-item ${currentMateriaId === m.id ? 'active' : ''}" onclick="seleccionarMateria(${m.id})">
                <span>${escapeHtml(m.nombre)}</span>
                ${adminMode ? `<button class="delete-materia" onclick="event.stopPropagation(); eliminarMateria(${m.id})"><i class="fas fa-trash-alt"></i></button>` : ''}
            </div>
        `).join('');
        const estSelect = document.getElementById('estMateria');
        estSelect.innerHTML = '<option value="">-- Materia --</option>' + materias.map(m => `<option value="${m.id}">${escapeHtml(m.nombre)}</option>`).join('');
    }

    window.seleccionarMateria = function(id) {
        currentMateriaId = id;
        renderSidebar();
        const materia = getCurrentMateria();
        const mostrar = currentMateriaId !== null;
        document.getElementById('fechasSection').style.display = mostrar ? 'block' : 'none';
        document.getElementById('asistenciaSection').style.display = mostrar ? 'block' : 'none';
        const formMatricula = document.getElementById('formMatricula');
        if (formMatricula && mostrar && adminMode) {
            formMatricula.style.display = 'block';
        } else if (formMatricula) {
            formMatricula.style.display = 'none';
        }
        if (materia) {
            document.getElementById('materiaSeleccionada').innerText = `(${materia.nombre})`;
            document.getElementById('materiaActualMatricula').innerText = materia.nombre;
            document.getElementById('alumnoFechaIngreso').value = new Date().toISOString().slice(0,10);
            let venc = new Date(); venc.setFullYear(venc.getFullYear()+1);
            document.getElementById('alumnoFechaVencimiento').value = venc.toISOString().slice(0,10);
            renderFechas();
            renderTablaAsistencia();
        } else {
            const contadorMateria = document.getElementById('contadorAlumnosMateria');
            if (contadorMateria) contadorMateria.innerText = '';
            document.getElementById('tablaAsistencia').innerHTML = '';
        }
        renderListaGeneral();
    };

    function renderFechas() {
        const materia = getCurrentMateria();
        const container = document.getElementById('listaFechas');
        if (!materia || !materia.fechas) { container.innerHTML = ''; return; }

    window.eliminarFecha = function(idx) {
        if (!adminMode) return;
        const materia = getCurrentMateria();
        if (materia && materia.fechas[idx]) {
            materia.fechas.splice(idx,1);

    function getAlumnosOrdenadosFiltrados(asistencia = true) {
        let alumnos = asistencia ? (getCurrentMateria()?.alumnos || []) : getAlumnosGlobal();
        const search = asistencia ? searchAsistencia : searchGeneral;
        const orden = asistencia ? currentOrdenAsistencia : currentOrdenGeneral;
        if (search) {
            const term = search.toLowerCase();
            alumnos = alumnos.filter(a => 
                (a.apellido + ' ' + a.nombre).toLowerCase().includes(term) ||
                (a.dni || '').toLowerCase().includes(term) ||
                (a.pabellon || '').toLowerCase().includes(term)
            );
        }
        alumnos.sort((a,b) => {
            switch(orden) {
                case 'apellido_asc': return (a.apellido + a.nombre).localeCompare(b.apellido + b.nombre);
                case 'apellido_desc': return (b.apellido + b.nombre).localeCompare(a.apellido + a.nombre);
                case 'nombre_asc': return (a.nombre + a.apellido).localeCompare(b.nombre + b.apellido);
                case 'nombre_desc': return (b.nombre + b.apellido).localeCompare(a.nombre + a.apellido);
                case 'pabellon': return (a.pabellon || '').localeCompare(b.pabellon || '');
                case 'dni': return (a.dni || '').localeCompare(b.dni || '');
                default: return 0;
            }
        });
        return alumnos;
    }

        if (!alumno) return;

        const nuevoPabellon = prompt('Nuevo pabellón', alumno.pabellon);
        if (nuevoPabellon) alumno.pabellon = nuevoPabellon;
        const nuevaFechaIngreso = prompt('Fecha inscripción (YYYY-MM-DD)', alumno.fecha_inscripcion || '');
        if (nuevaFechaIngreso) alumno.fecha_inscripcion = nuevaFechaIngreso;

    function separarNombreApellido(nombreCompleto) {
        const partes = nombreCompleto.trim().split(/\s+/);
        if (partes.length === 1) return { nombre: partes[0], apellido: '' };
        const nombre = partes[0];
        const apellido = partes.slice(1).join(' ');
        return { nombre, apellido };

    function excelDateToJSDate(serial) {
        const utc_days = Math.floor(serial - 25569);
        const date = new Date(utc_days * 86400 * 1000);
        return date.toISOString().slice(0,10);
    }

    function importarExcel(file) {
        if (!adminMode) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            let sheetName = workbook.SheetNames.find(n => n === "ABRIL") || workbook.SheetNames[0];
            const worksheet = workbook.Sheets[sheetName];
            if (!worksheet) return alert("No se encontró hoja de datos");
            const rows = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });
            if (!rows.length) return alert("Archivo vacío");

            let materiaNombre = "";
            if (rows[1] && rows[1][1]) {
                materiaNombre = rows[1][1].toString().trim();
            }
            if (!materiaNombre) materiaNombre = "Materia importada";

            let headerRowIndex = -1;
            let fechas = [];
            for (let i = 0; i < rows.length; i++) {
                const row = rows[i];
                if (!row) continue;
                if (row[0] && row[0].toString().toUpperCase().includes("APELLIDO")) {
                    headerRowIndex = i;
                    for (let j = 4; j < row.length; j++) {
                        let fechaVal = row[j];
                        if (fechaVal) {
                            if (typeof fechaVal === 'number') fechaVal = excelDateToJSDate(fechaVal);
                            else if (typeof fechaVal === 'object' && fechaVal.toISOString) fechaVal = fechaVal.toISOString().slice(0,10);
                            else if (typeof fechaVal === 'string') {
                                let num = parseFloat(fechaVal);
                                if (!isNaN(num) && num > 40000) fechaVal = excelDateToJSDate(num);
                            }
                            if (fechaVal && fechaVal.toString().trim() !== "") fechas.push(fechaVal.toString().trim());
                        }
                    }
                    break;
                }
            }
            if (headerRowIndex === -1) return alert("No se encontró la fila de encabezados");

            const alumnosData = [];
            for (let i = headerRowIndex + 1; i < rows.length; i++) {
                const row = rows[i];
                if (!row || row.length < 4) continue;
                const apellido = row[0]?.toString().trim() || "";
                const nombre = row[1]?.toString().trim() || "";
                const dni = row[2]?.toString().trim() || "";
                const pabellon = row[3]?.toString().trim() || "";
                if (apellido === "" && nombre === "" && dni === "") continue;
                const asistencias = [];
                for (let j = 4; j < row.length; j++) {
                    const val = row[j]?.toString().trim().toUpperCase();
                    asistencias.push(val === "SI" || val === "SÍ" || val === "X" || val === "1");
                }
                alumnosData.push({ apellido, nombre, dni, pabellon, asistencias });
            }
            if (alumnosData.length === 0) return alert("No se encontraron alumnos");

            let materia = globalData.materias.find(m => m.nombre === materiaNombre);
            if (!materia) {
                const newId = Date.now();
                materia = { id: newId, nombre: materiaNombre, dias: [], horario: '', fechas: fechas, alumnos: [] };
                globalData.materias.push(materia);
            } else {
                if (!materia.fechas) materia.fechas = [];
                fechas.forEach(f => { if (!materia.fechas.includes(f)) materia.fechas.push(f); });
            }

            const hoy = new Date().toISOString().slice(0,10);
            const vencDef = new Date(); vencDef.setFullYear(vencDef.getFullYear()+1);
            for (let al of alumnosData) {
                const idUnico = Date.now() + '-' + Math.random().toString(36).substr(2, 5);
                const nuevoAlumno = {
                    id: idUnico,
                    apellido: al.apellido,
                    nombre: al.nombre,
                    dni: al.dni,
                    pabellon: al.pabellon,
                    fecha_inscripcion: hoy,
                    fecha_vencimiento_carnet: vencDef.toISOString().slice(0,10),
                    asist: {},
                    observaciones: ''
                };
                if (!globalData.alumnos.some(a => a.id === idUnico)) {
                    globalData.alumnos.push(nuevoAlumno);
                }
                const alumnoMateria = { ...nuevoAlumno, asist: {}, observaciones: '' };
                if (!materia.alumnos.some(a => a.id === idUnico)) {
                    materia.alumnos.push(alumnoMateria);
                }
                for (let idx = 0; idx < fechas.length; idx++) {
                    if (al.asistencias[idx] === true) {
                        alumnoMateria.asist[fechas[idx]] = true;
                    }
                }
            }
            guardarLocal();
            currentMateriaId = materia.id;
            seleccionarMateria(materia.id);
            alert(`✅ Importado: ${alumnosData.length} alumnos, ${fechas.length} fechas.`);
        };
        reader.readAsArrayBuffer(file);
    }

    async function generarEstadisticas() {
        const materiaId = parseInt(document.getElementById('estMateria').value);
        if (!materiaId) {
            document.getElementById('estadisticasResumen').innerHTML = '<div class="help-text">Seleccione una materia para ver estadísticas.</div>';
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        const materia = globalData.materias.find(m => m.id === materiaId);
        if (!materia) {
            document.getElementById('estadisticasResumen').innerHTML = '<div class="help-text">Materia no encontrada.</div>';
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        const fechas = materia.fechas || [];
        const totalClases = fechas.length;
        if (totalClases === 0) {
            document.getElementById('estadisticasResumen').innerHTML = '<div class="help-text">No hay fechas cargadas para esta materia.</div>';
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            return;
        }
        let totalAsistencias = 0;
        const alumnosMap = new Map();
        (materia.alumnos || []).forEach(al => {
            if (!alumnosMap.has(al.id)) {
                alumnosMap.set(al.id, {
                    nombre: `${al.apellido} ${al.nombre}`,
                    dni: al.dni,
                    asistencias: 0,
                    faltas: 0
                });
            }
            const stats = alumnosMap.get(al.id);
            fechas.forEach(f => {
                if (al.asist && al.asist[f]) {
                    stats.asistencias++;
                    totalAsistencias++;
                } else {
                    stats.faltas++;
                }
            });
        });
        const totalAlumnos = alumnosMap.size;
        const totalFaltas = (totalClases * totalAlumnos) - totalAsistencias;
        const pctGeneral = totalClases * totalAlumnos ? Math.round(totalAsistencias / (totalClases * totalAlumnos) * 100) : 0;
        let html = `<div style="display:grid; grid-template-columns:repeat(3,1fr); gap:0.8rem; margin-bottom:0.8rem;">
            <div style="background:#0f172a; padding:0.5rem; border-radius:0.5rem; text-align:center;">
                <h3 style="font-size:0.9rem;">Asistencias</h3>
                <p style="font-size:1.2rem;">${totalAsistencias}</p>
            </div>
            <div style="background:#0f172a; padding:0.5rem; border-radius:0.5rem; text-align:center;">
                <h3 style="font-size:0.9rem;">Faltas</h3>
                <p style="font-size:1.2rem;">${totalFaltas}</p>
            </div>
            <div style="background:#0f172a; padding:0.5rem; border-radius:0.5rem; text-align:center;">
                <h3 style="font-size:0.9rem;">% General</h3>
                <p style="font-size:1.2rem;">${pctGeneral}%</p>
            </div>
        </div>`;
        document.getElementById('estadisticasResumen').innerHTML = html;
        if (chartInstance) { chartInstance.destroy(); }
        const ctx = document.getElementById('graficoAsistencia').getContext('2d');
        const labels = Array.from(alumnosMap.values()).map(a => a.nombre.split(' ')[0]);
        const data = Array.from(alumnosMap.values()).map(a => totalClases ? Math.round(a.asistencias / totalClases * 100) : 0);
        if (labels.length > 0) {
            chartInstance = new Chart(ctx, {
                type: 'bar',
                data: { labels, datasets: [{ label: '% Asistencia', data, backgroundColor: '#4f46e5' }] },
                options: { responsive: true, scales: { y: { max: 100, beginAtZero: true } } }
            });
        } else {
            chartInstance = null;
        }
    }

    function resetearTodo() {
        if (!adminMode) return;
        if (confirm('⚠️ Eliminar TODOS los datos?')) {
            globalData = { materias: [], alumnos: [] };
            currentMateriaId = null;
            guardarLocal();
            renderSidebar();
            seleccionarMateria(null);
            renderListaGeneral();
            document.getElementById('estadisticasResumen').innerHTML = '<div class="help-text">No hay datos para mostrar.</div>';
            if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
            const contadorTotal = document.getElementById('contadorAlumnosTotal');
            if (contadorTotal) contadorTotal.innerText = '0 alumnos';
            const contadorMateria = document.getElementById('contadorAlumnosMateria');
            if (contadorMateria) contadorMateria.innerText = '';
            document.getElementById('tablaAsistencia').innerHTML = '';
            document.getElementById('listaFechas').innerHTML = '';
            document.getElementById('fechasSection').style.display = 'none';
            document.getElementById('asistenciaSection').style.display = 'none';
            document.getElementById('formMatricula').style.display = 'none';
            mostrarToast('Datos eliminados');
        }
    }

    document.getElementById('searchAlumno').addEventListener('input', (e) => { searchAsistencia = e.target.value; renderTablaAsistencia(); });
    document.getElementById('orderAsistencia').addEventListener('change', (e) => { currentOrdenAsistencia = e.target.value; renderTablaAsistencia(); });
    document.getElementById('searchGeneral').addEventListener('input', (e) => { searchGeneral = e.target.value; renderListaGeneral(); });
    document.getElementById('orderGeneral').addEventListener('change', (e) => { currentOrdenGeneral = e.target.value; renderListaGeneral(); });

    document.getElementById('btnNuevaMateria').onclick = () => {
        if (!adminMode) return;
        document.getElementById('modalNuevaMateria').classList.add('active');
    };
    document.getElementById('closeModalBtn').onclick = () => document.getElementById('modalNuevaMateria').classList.remove('active');
    document.getElementById('cancelarNuevaMateria').onclick = () => document.getElementById('modalNuevaMateria').classList.remove('active');
    document.getElementById('confirmarNuevaMateria').onclick = () => {
        if (!adminMode) return;
        const nombre = document.getElementById('nuevaMateriaNombre').value.trim();
        const dias = Array.from(document.querySelectorAll('#modalNuevaMateria .checkbox-group input:checked')).map(cb => cb.value);
        const horaInicio = document.getElementById('nuevaMateriaHoraInicio').value;
        const horaFin = document.getElementById('nuevaMateriaHoraFin').value;
        if (!nombre) return alert('El nombre es obligatorio');
        crearMateria(nombre, dias, horaInicio, horaFin);
        document.getElementById('modalNuevaMateria').classList.remove('active');
        document.getElementById('nuevaMateriaNombre').value = '';
        document.querySelectorAll('#modalNuevaMateria .checkbox-group input:checked').forEach(cb => cb.checked = false);
        document.getElementById('nuevaMateriaHoraInicio').value = '';
        document.getElementById('nuevaMateriaHoraFin').value = '';
    };

    document.getElementById('guardarAlumno').onclick = () => {
        if (!adminMode) return;
        const a = document.getElementById('alumnoApellido').value.trim();
        const n = document.getElementById('alumnoNombre').value.trim();
        const d = document.getElementById('alumnoDNI').value.trim();
        const p = document.getElementById('alumnoPabellon').value.trim();
        const fi = document.getElementById('alumnoFechaIngreso').value;
        const fv = document.getElementById('alumnoFechaVencimiento').value;
        matricularAlumnoManual(a, n, d, p, fi, fv);
        document.getElementById('alumnoApellido').value = '';
        document.getElementById('alumnoNombre').value = '';
        document.getElementById('alumnoDNI').value = '';
        document.getElementById('alumnoPabellon').value = '';
        document.getElementById('alumnoFechaIngreso').value = new Date().toISOString().slice(0,10);
        let venc = new Date(); venc.setFullYear(venc.getFullYear()+1);
        document.getElementById('alumnoFechaVencimiento').value = venc.toISOString().slice(0,10);
    };
    document.getElementById('agregarFechaBtn').onclick = () => {
        if (!adminMode) return;
        const fecha = document.getElementById('nuevaFecha').value.trim();
        if (fecha) agregarFecha(fecha);
        document.getElementById('nuevaFecha').value = '';
    };
    document.getElementById('eliminarFechaBtn').onclick = () => {
        if (!adminMode) return;
        const materia = getCurrentMateria();
        if (!materia || !materia.fechas.length) return alert('No hay fechas');
        const idx = prompt(`Fechas disponibles:\n${materia.fechas.map((f,i)=>`${i+1}. ${f}`).join('\n')}\nNúmero a eliminar:`);
        if (idx && !isNaN(idx) && idx>=1 && idx<=materia.fechas.length) {
            materia.fechas.splice(idx-1,1);
            guardarLocal();
            renderFechas();
            renderTablaAsistencia();
            mostrarToast('Fecha eliminada');
        }
    };
    document.getElementById('btnExportarExcel').onclick = exportarExcel;
    document.getElementById('btnImportarExcel').onclick = () => {
        if (!adminMode) return;
        document.getElementById('fileExcel').click();
    };
    document.getElementById('fileExcel').onchange = (e) => { if(e.target.files[0]) importarExcel(e.target.files[0]); };
    document.getElementById('btnResetear').onclick = resetearTodo;
    document.getElementById('generarEstadisticasBtn').onclick = generarEstadisticas;
    document.getElementById('btnLogoutAdmin').onclick = () => disableAdminMode();
    document.getElementById('btnMatricular').onclick = () => {
        if (!adminMode) return;
        if (!getCurrentMateria()) return alert('Seleccione una materia');
        document.getElementById('formMatricula').style.display = 'block';
    };

    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('es-ES');
    }, 1000);

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    document.getElementById('hamburgerBtn').onclick = toggleSidebar;
    document.getElementById('closeSidebarBtn').onclick = () => document.getElementById('sidebar').classList.remove('open');
    document.addEventListener('click', function(e) {
        const sidebar = document.getElementById('sidebar');
        const hamburger = document.getElementById('hamburgerBtn');
        if (window.innerWidth <= 768 && sidebar.classList.contains('open') && !sidebar.contains(e.target) && e.target !== hamburger && !hamburger.contains(e.target)) {
            sidebar.classList.remove('open');
        }
    });

    async function iniciar() {
        adminMode = false;
        localStorage.removeItem('adminMode');
        
        const local = localStorage.getItem('cpu_data');
        if (local) { try { globalData = JSON.parse(local); } catch(e) {} }
        if ((!globalData.materias || globalData.materias.length === 0) && (!globalData.alumnos || globalData.alumnos.length === 0)) {
            const ok = await cargarDesdeGitHub();
            if (!ok) {
                globalData = { materias: [], alumnos: [] };
                guardarLocal();
            }
        } else {
            if (!globalData.materias) globalData.materias = [];
            if (!globalData.alumnos) globalData.alumnos = [];
            guardarLocal();
        }
        setupAdminToggle();
        renderizarSegunRol();
        renderSidebar();
        if (currentMateriaId) seleccionarMateria(currentMateriaId);
        renderListaGeneral();
        document.getElementById('alumnoFechaIngreso').value = new Date().toISOString().slice(0,10);
        let venc = new Date(); venc.setFullYear(venc.getFullYear()+1);
        document.getElementById('alumnoFechaVencimiento').value = venc.toISOString().slice(0,10);
        if (globalData.materias.length === 0) {
            document.getElementById('estadisticasResumen').innerHTML = '<div class="help-text">No hay datos para mostrar.</div>';
            if (chartInstance) chartInstance.destroy();
        }
    }
    iniciar();

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m; }); }
</script>
</body>
</html>
